name: quartz
description: quartz silverblue image - minimal and bloatware-free

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
        - librewolf
    
    remove:
      packages:
        
        - firefox
        - firefox-langpacks
        
       
        - gnome-maps
        - gnome-weather
        - gnome-music
        - gnome-photos
        - gnome-tour
        - gnome-contacts
        - gnome-calendar
        - gnome-online-accounts  #
        
       
        - evolution
        - evolution-data-server
        - evolution-devel
        - geary  # cliente de email
        - totem  # reproductor de video 
        - rhythmbox  # reproductor de música
        - baobab  # analizador de disco
        - gnome-calculator
        - simple-scan  # escáner
        - gnome-logs  # visor de logs 
        
      
        - yelp  # help system
        - tracker-miners  # indexador de archivos (consume recursos)
        - tracker  # indexación
        #- adwaita-icon-theme  # si usas otro theme
        
        
         - at-spi2-core
         - orca
         - speech-dispatcher
        
        
        - google-noto-fonts-common  # si no las usas
        - google-noto-serif-fonts
        - google-noto-mono-fonts
        
        
        - gnome-user-docs
        - fedora-release-notes
        
        
         - fprintd  # sensor de huella dactilar
         - cups-pk-helper  # impresoras
         - cups  # servidor de impresión
        
        
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox  
          - org.gnome.Loupe
      - scope: user

  - type: signing
